version: '3.8'

# ── Local dev — mirrors the K8s setup ─────────────────────────
# Usage: docker compose up
# Frontend: http://localhost:80
# API:      http://localhost:3001
# DB:       localhost:5432

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: changeme
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./apps/frontend
    ports:
      - "80:80"
    environment:
      API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
