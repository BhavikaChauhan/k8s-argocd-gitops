<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Project Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8eaed; min-height: 100vh; }
    .header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: #6366f1; }
    .env-badge { background: #1e3a5f; color: #60a5fa; font-size: 11px; padding: 4px 10px; border-radius: 4px; font-family: monospace; }
    .hero { text-align: center; padding: 80px 32px 40px; }
    .hero h1 { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
    .hero p { color: #9ca3af; font-size: 18px; margin-bottom: 32px; }
    .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 800px; margin: 0 auto 48px; padding: 0 32px; }
    .status-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 20px; text-align: center; }
    .status-card .value { font-size: 28px; font-weight: 800; color: #6366f1; margin-bottom: 4px; }
    .status-card .label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; }
    .api-section { max-width: 800px; margin: 0 auto; padding: 0 32px 48px; }
    .api-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #e8eaed; }
    .api-result { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; color: #a3e635; min-height: 80px; white-space: pre-wrap; }
    .btn { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; margin-right: 8px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: none; border: 1px solid #6366f1; color: #6366f1; }
    .footer { text-align: center; padding: 24px; color: #4b5563; font-size: 12px; font-family: monospace; border-top: 1px solid #1a1d27; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ TaskFlow</div>
    <div class="env-badge" id="env-badge">Loading...</div>
  </div>

  <div class="hero">
    <h1>Kubernetes + GitOps</h1>
    <p>3-service microservices app deployed with ArgoCD on Kubernetes</p>
    <button class="btn" onclick="fetchTasks()">Fetch Tasks from API</button>
    <button class="btn btn-outline" onclick="checkHealth()">Health Check</button>
  </div>

  <div class="status-grid">
    <div class="status-card">
      <div class="value" id="task-count">—</div>
      <div class="label">Tasks in DB</div>
    </div>
    <div class="status-card">
      <div class="value" id="api-status">—</div>
      <div class="label">API Status</div>
    </div>
    <div class="status-card">
      <div class="value" id="db-status">—</div>
      <div class="label">DB Status</div>
    </div>
  </div>

  <div class="api-section">
    <h2>API Response</h2>
    <div class="api-result" id="api-result">Click a button above to call the API...</div>
  </div>

  <div class="footer">
    Deployed via ArgoCD GitOps · Kubernetes · Built by Bhavika Chauhan
  </div>

  <script>
    const API_URL = window.API_URL || 'http://localhost:3001';

    async function fetchTasks() {
      document.getElementById('api-result').textContent = 'Calling API...';
      try {
        const res = await fetch(`${API_URL}/api/tasks`);
        const data = await res.json();
        document.getElementById('api-result').textContent = JSON.stringify(data, null, 2);
        document.getElementById('task-count').textContent = data.count || data.data?.length || '—';
        document.getElementById('api-status').textContent = '✅';
      } catch (e) {
        document.getElementById('api-result').textContent = `Error: ${e.message}\n\nNote: In the demo, the API runs at ${API_URL}`;
        document.getElementById('api-status').textContent = '❌';
      }
    }

    async function checkHealth() {
      document.getElementById('api-result').textContent = 'Checking health...';
      try {
        const res = await fetch(`${API_URL}/health`);
        const data = await res.json();
        document.getElementById('api-result').textContent = JSON.stringify(data, null, 2);
        document.getElementById('api-status').textContent = data.api === 'healthy' ? '✅' : '⚠️';
        document.getElementById('db-status').textContent = data.database === 'healthy' ? '✅' : '⚠️';
        document.getElementById('env-badge').textContent = `env: ${data.environment || 'unknown'}`;
      } catch (e) {
        document.getElementById('api-result').textContent = `Error: ${e.message}`;
      }
    }

    // Auto-check health on load
    checkHealth().catch(() => {
      document.getElementById('env-badge').textContent = 'env: demo';
    });
  </script>
</body>
</html>
