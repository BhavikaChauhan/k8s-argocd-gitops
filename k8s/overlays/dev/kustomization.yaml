apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskflow-dev

resources:
  - ../../base/database
  - ../../base/api
  - ../../base/frontend
  - ../../base/ingress.yaml

# Dev: scale down to save resources
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api
      spec:
        replicas: 1

commonLabels:
  environment: dev

configMapGenerator:
  - name: api-config
    behavior: merge
    literals:
      - NODE_ENV=development
